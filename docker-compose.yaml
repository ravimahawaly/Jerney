services:
   # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: jerney-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jerney_user
      POSTGRES_PASSWORD: jerney_pass_2026
      POSTGRES_DB: jerney_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jerney-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jerney_user -d jerney_db -h localhost -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Security: read-only root filesystem where possible
    tmpfs:
      - /tmp
      - /run

  # ---- Backend API ----
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: jerney-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      DB_USER: jerney_user
      DB_PASSWORD: jerney_pass_2026
      DB_NAME: jerney_db
      DB_HOST: postgres
      DB_PORT: 5432
    expose:
      - 5000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - jerney-network
    # Security: do not run as root (already in Dockerfile, but enforced here too)
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # ---- Frontend (Nginx + React) ----
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jerney-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jerney-network
    security_opt:
      - no-new-privileges:true
    
  
volumes:
  postgres_data:
    driver: local

networks:
  jerney-network:
    driver: bridge